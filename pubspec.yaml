name: ksrtc_smarttrack
description: "KSRTC SmartTrack - Real-time bus tracking system"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # Google Maps
  google_maps_flutter: ^2.12.1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Route polyline decoding
  flutter_polyline_points: ^2.1.0

  # State management
  flutter_riverpod: ^2.6.1

  # Text to Speech
  flutter_tts: ^4.2.0

  # HTTP for Directions/Places API
  http: ^1.3.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
